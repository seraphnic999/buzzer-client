<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="btn" cx="38%" cy="35%" r="62%">
      <stop offset="0%"   stop-color="#ff4444"/>
      <stop offset="60%"  stop-color="#cc0000"/>
      <stop offset="100%" stop-color="#880000"/>
    </radialGradient>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
  </defs>

  <!-- Background tile -->
  <rect width="100" height="100" rx="20" fill="url(#bg)"/>

  <!-- Bezel ring -->
  <circle cx="50" cy="51" r="41" fill="#1c0000"/>
  <circle cx="50" cy="51" r="40" fill="#2a0000"/>

  <!-- Button 3-D shadow (offset down) -->
  <circle cx="50" cy="55" r="33" fill="#660000"/>

  <!-- Main button face -->
  <circle cx="50" cy="50" r="33" fill="url(#btn)"/>

  <!-- Top glint (soft white highlight) -->
  <ellipse cx="40" cy="38" rx="12" ry="7" fill="white" opacity="0.13"/>
  <ellipse cx="37" cy="35" rx="5"  ry="3" fill="white" opacity="0.10"/>
</svg>
